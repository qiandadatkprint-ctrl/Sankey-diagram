<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全厂能资源平衡桑基图生成系统 - 智能延展版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: "Times New Roman", SimSun, sans-serif; }
        .input-area { font-family: monospace; font-size: 13px; height: 320px; border: 2px dashed #cbd5e1; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
        .section-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .nav-tab { cursor: pointer; padding: 10px 16px; font-weight: bold; border-bottom: 3px solid transparent; display: flex; align-items: center;}
        .nav-tab.active { border-bottom-color: #3b82f6; color: #3b82f6; background-color: #eff6ff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .font-btn { border: 1px solid #cbd5e1; padding: 2px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s; background: #fff;}
        .font-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="p-4">

<div id="app" class="max-w-screen-2xl mx-auto space-y-4">
    <h1 class="text-3xl font-bold text-center mb-4" style="font-family: SimSun;">全厂能资源平衡桑基图生成系统</h1>

    <div class="flex space-x-1 bg-white rounded-t-lg shadow border-b px-2 pt-2 overflow-x-auto no-scrollbar items-end">
        <div v-for="(tab, index) in tabs" :key="tab.id" 
             @click="activeTabId = tab.id"
             :class="['nav-tab whitespace-nowrap', activeTabId === tab.id ? 'active' : 'text-gray-500 hover:text-gray-700']">
            {{ tab.name }}
            <button v-if="tab.id !== 'water' && tab.id !== 'total'" @click.stop="removeTab(index)" class="ml-2 text-red-400 font-bold text-xs">×</button>
        </div>
        <button @click="addTab" class="ml-2 mb-2 px-3 py-1 bg-blue-50 text-blue-600 border border-blue-200 rounded text-sm font-bold hover:bg-blue-100">+ 新增能源</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 bg-white p-6 shadow rounded-b-lg mt-0 border-t-0">
        <div class="lg:col-span-4 flex flex-col space-y-4 max-h-screen overflow-y-auto no-scrollbar pb-20">
            
            <div class="section-card border-t-4 border-blue-500 bg-gray-50">
                <div class="flex flex-col space-y-3 mb-4 border-b pb-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-sm font-bold whitespace-nowrap">图表名称:</span>
                        <input v-model="currentTab.name" class="border rounded px-2 py-1 w-full text-sm font-bold">
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-sm font-bold whitespace-nowrap">数据单位:</span>
                        <input v-model="currentTab.unit" placeholder="不填则无单位" class="border rounded px-2 py-1 w-full text-sm bg-yellow-50 text-blue-700 font-bold">
                    </div>
                    <div v-if="activeTabId !== 'water' && activeTabId !== 'total'" class="flex items-center space-x-2 bg-yellow-100 p-2 rounded">
                        <input type="checkbox" v-model="currentTab.isEnergy" :id="'isEng_'+currentTab.id">
                        <label :for="'isEng_'+currentTab.id" class="text-sm font-bold cursor-pointer">参与能耗计算</label>
                        <span v-if="currentTab.isEnergy" class="text-xs ml-1">折标系数:</span>
                        <input v-if="currentTab.isEnergy" v-model.number="currentTab.factor" type="number" step="0.0001" class="border rounded px-1 py-1 w-16 text-sm">
                    </div>
                </div>

                <div v-if="activeTabId === 'total'">
                    <textarea readonly v-model="autoGeneratedTotalData" class="input-area w-full p-3 bg-gray-200 text-xs text-gray-500"></textarea>
                </div>
                <div v-else>
                    <textarea v-model="currentTab.data" class="input-area w-full p-3" 
                        placeholder="【数据填报格式标准】
必须包含 3 列数据，中间用空格或Tab键隔开。
格式：起点名称 [空格] 终点名称 [空格] 消耗数值

【输入规范与排错说明】
1. 节点名称内绝不能包含空格（如需断句请用下划线：晶圆_切割）。
2. 每行仅代表一根流线，不能多填或少填列数。
3. 请直接从Excel复制三列数据（起点列、终点列、数值列）并粘贴至此。

【标准输入示例】
市电网 主生产车间 1200
市电网 环保处理站 350
主生产车间 贴片机组 800
主生产车间 回流焊炉 400
"></textarea>
                </div>
            </div>

            <div class="section-card border-t-4 border-red-500 bg-red-50" v-if="selectedElement.name || selectedElement.source">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-md font-bold text-red-800" style="font-family: SimSun;">🛠️ 选中项精细调整</h2>
                    <button @click="clearSelection" class="text-xs text-gray-500 underline">取消选中</button>
                </div>
                <div class="space-y-3 text-xs">
                    <div class="bg-white p-2 rounded border">
                        <span class="font-bold">对象：</span>
                        <span class="text-blue-600">{{ selectedElement.name || (selectedElement.source + ' ➔ ' + selectedElement.target) }}</span>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="flex-1">
                            <label class="block mb-1 font-bold">颜色:</label>
                            <input type="color" v-model="elementStyles[elementKey].color" class="w-full h-8 cursor-pointer rounded border p-0">
                        </div>
                        <div class="flex-1">
                            <label class="block mb-1 font-bold">透明度:</label>
                            <input type="range" v-model.number="elementStyles[elementKey].opacity" min="0.1" max="1" step="0.1" class="w-full">
                        </div>
                    </div>

                    <div v-if="selectedElement.name" class="border-t border-red-200 pt-3 mt-2 space-y-2">
                        <div class="font-bold text-blue-700 mb-1">【文本字体控制】</div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block mb-1">中文字体:</label>
                                <select v-model="elementStyles[elementKey].fontFamilyCN" class="w-full border rounded p-1">
                                    <option value="SimSun">宋体 (SimSun)</option>
                                    <option value="SimHei">黑体 (SimHei)</option>
                                    <option value="Microsoft YaHei">微软雅黑</option>
                                    <option value="KaiTi">楷体 (KaiTi)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block mb-1">西文字体:</label>
                                <select v-model="elementStyles[elementKey].fontFamilyEN" class="w-full border rounded p-1">
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Arial">Arial</option>
                                    <option value="Verdana">Verdana</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex space-x-2">
                                <button @click="elementStyles[elementKey].isBold = !elementStyles[elementKey].isBold" :class="['font-btn font-bold', elementStyles[elementKey].isBold ? 'active' : '']">B</button>
                                <button @click="elementStyles[elementKey].isItalic = !elementStyles[elementKey].isItalic" :class="['font-btn italic', elementStyles[elementKey].isItalic ? 'active' : '']">I</button>
                                <button @click="elementStyles[elementKey].isUnderline = !elementStyles[elementKey].isUnderline" :class="['font-btn underline', elementStyles[elementKey].isUnderline ? 'active' : '']">U</button>
                            </div>
                            <div class="flex items-center space-x-2">
                                <label>大小:</label>
                                <input type="number" v-model.number="elementStyles[elementKey].fontSize" class="border rounded px-1 w-12">
                            </div>
                        </div>
                        <div>
                            <label class="block mt-2 mb-1">特定位置:</label>
                            <select v-model="elementStyles[elementKey].labelPosition" class="w-full border rounded p-1">
                                <option value="">跟随全局</option>
                                <option value="right">节点右侧</option>
                                <option value="left">节点左侧</option>
                                <option value="inside">节点内部</option>
                                <option value="top">节点上方</option>
                                <option value="bottom">节点下方</option>
                            </select>
                        </div>
                    </div>
                    <button @click="resetElementStyle" class="w-full border border-red-300 py-1 rounded hover:bg-red-100 mt-2">恢复全局配置</button>
                </div>
            </div>

            <div class="section-card border-t-4 border-purple-500">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-md font-bold" style="font-family: SimSun;">🎨 全局外观与排版控制</h2>
                    <div class="flex items-center space-x-1">
                        <input type="checkbox" id="enableDrag" v-model="chartStyle.enableDrag">
                        <label for="enableDrag" class="text-xs font-bold text-red-600">允许方块拖拽</label>
                    </div>
                </div>

                <div class="space-y-2 border-b pb-3 mb-3 text-xs bg-blue-50 p-2 rounded">
                    <div class="font-bold text-blue-700">【节点间距与防重叠引擎】</div>
                    <div class="text-gray-600 mb-2">💡 提示：若图中文字重叠，请拉大下方间距，系统将自动向下延展总画布高度，彻底拉开空间。</div>
                    <div>
                        <label class="block mb-1 font-bold">上下间距跨度: {{chartStyle.nodeGap}}px</label>
                        <input type="range" v-model.number="chartStyle.nodeGap" min="5" max="80" class="w-full">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 text-xs border-b pb-3 mb-3">
                    <div class="col-span-2 text-blue-700 font-bold mb-1">【几何结构与曲率】</div>
                    <div>
                        <label class="block mb-1">流线曲率(平滑度): {{chartStyle.curveness}}</label>
                        <input type="range" v-model.number="chartStyle.curveness" min="0" max="1" step="0.1" class="w-full">
                    </div>
                    <div>
                        <label class="block mb-1">流线透明度: {{chartStyle.opacity}}</label>
                        <input type="range" v-model.number="chartStyle.opacity" min="0.1" max="1" step="0.1" class="w-full">
                    </div>
                    <div class="col-span-2">
                        <label class="block mb-1">节点方块宽度: {{chartStyle.nodeWidth}}px</label>
                        <input type="range" v-model.number="chartStyle.nodeWidth" min="10" max="60" class="w-full">
                    </div>
                </div>

                <div class="space-y-2 border-b pb-3 mb-3 text-xs">
                    <div class="font-bold text-blue-700">【全局字体引擎】</div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block mb-1">中文字体:</label>
                            <select v-model="chartStyle.fontFamilyCN" class="w-full border rounded p-1">
                                <option value="SimSun">宋体 (SimSun)</option>
                                <option value="SimHei">黑体 (SimHei)</option>
                                <option value="Microsoft YaHei">微软雅黑</option>
                                <option value="KaiTi">楷体 (KaiTi)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block mb-1">数字/西文:</label>
                            <select v-model="chartStyle.fontFamilyEN" class="w-full border rounded p-1">
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Arial">Arial</option>
                                <option value="Verdana">Verdana</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                        <div class="flex space-x-2">
                            <button @click="chartStyle.isBold = !chartStyle.isBold" :class="['font-btn font-bold', chartStyle.isBold ? 'active' : '']">B</button>
                            <button @click="chartStyle.isItalic = !chartStyle.isItalic" :class="['font-btn italic', chartStyle.isItalic ? 'active' : '']">I</button>
                            <button @click="chartStyle.isUnderline = !chartStyle.isUnderline" :class="['font-btn underline', chartStyle.isUnderline ? 'active' : '']">U</button>
                        </div>
                        <div class="flex items-center space-x-2">
                            <label>大小(px):</label>
                            <input type="number" v-model.number="chartStyle.fontSize" class="border rounded px-1 w-12">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>
                            <label class="block mb-1">文本颜色:</label>
                            <input type="color" v-model="chartStyle.textColor" class="w-full h-8 p-0 border">
                        </div>
                        <div>
                            <label class="block mb-1">标签基准位置:</label>
                            <select v-model="chartStyle.labelPosition" class="border rounded w-full p-1 bg-white h-8">
                                <option value="right">节点右侧 (默认)</option>
                                <option value="left">节点左侧 (自动避让)</option>
                                <option value="inside">节点内部</option>
                                <option value="top">节点上方</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 text-xs">
                    <div class="col-span-2 text-blue-700 font-bold mb-1">【画布防裁剪留白 (百分比)】</div>
                    <div><label>左侧: {{chartStyle.marginLeft}}%</label><input type="range" v-model.number="chartStyle.marginLeft" min="0" max="50" class="w-full"></div>
                    <div><label>右侧: {{chartStyle.marginRight}}%</label><input type="range" v-model.number="chartStyle.marginRight" min="0" max="50" class="w-full"></div>
                    <div><label>顶部: {{chartStyle.marginTop}}%</label><input type="range" v-model.number="chartStyle.marginTop" min="5" max="40" class="w-full"></div>
                    <div><label>底部: {{chartStyle.marginBottom}}%</label><input type="range" v-model.number="chartStyle.marginBottom" min="5" max="40" class="w-full"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col">
            <div class="section-card h-full flex flex-col border border-gray-200">
                <div class="flex justify-between items-center mb-2 shrink-0">
                    <span class="text-sm font-bold text-gray-500">图表面板 (向下滚动可查看全图)</span>
                    <button @click="downloadChart" class="bg-blue-600 text-white px-4 py-1 rounded text-sm font-bold shadow hover:bg-blue-700 transition">📥 导出高清图</button>
                </div>
                
                <div class="relative w-full overflow-y-auto overflow-x-hidden border border-dashed border-gray-300 bg-gray-50 rounded" style="height: 800px;">
                    <div v-for="tab in tabs" :key="tab.id" v-show="activeTabId === tab.id" :id="'chart_' + tab.id" class="absolute top-0 left-0 w-full" :style="{ height: dynamicCanvasHeight + 'px' }"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, watch, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const tabs = ref([
                { id: 'water', name: '全厂水平衡', unit: 'm³/a', isEnergy: false, factor: 0, data: "" },
                { id: 'elec', name: '全厂电平衡', unit: '万kWh', isEnergy: true, factor: 2.88, data: "" },
                { id: 'total', name: '综合能耗折标平衡', unit: '吨标煤', isEnergy: false, factor: 1, data: "" }
            ]);

            const activeTabId = ref('water');
            const currentTab = computed(() => tabs.value.find(t => t.id === activeTabId.value));

            const selectedElement = ref({});
            const elementStyles = ref({}); 
            const elementKey = computed(() => {
                if (selectedElement.value.name) return `node_${selectedElement.value.name}`;
                if (selectedElement.value.source) return `link_${selectedElement.value.source}_${selectedElement.value.target}`;
                return '';
            });

            const chartStyle = ref({
                enableDrag: true,
                curveness: 0.5, 
                marginLeft: 15, marginRight: 15, marginTop: 5, marginBottom: 5,
                nodeWidth: 20, nodeGap: 20, // 初始间距设为20
                textColor: '#000000', labelPosition: 'right', opacity: 0.4,
                fontFamilyCN: 'SimSun', fontFamilyEN: 'Times New Roman',
                fontSize: 13, isBold: false, isItalic: false, isUnderline: false
            });

            const chartInstances = {};

            // 核心功能：基于节点数和用户设定的间距，自动计算所需的画布总高度
            const dynamicCanvasHeight = computed(() => {
                const tab = currentTab.value;
                if (!tab || !tab.data.trim()) return 750;
                
                const lines = tab.data.trim().split('\n');
                const nodeSet = new Set();
                lines.forEach(l => {
                    const p = l.trim().split(/\s+/);
                    if (p.length >= 3 && !isNaN(parseFloat(p[2]))) {
                        nodeSet.add(p[0]); nodeSet.add(p[1]);
                    }
                });
                
                // 估算：桑基图按列分布，最高列的节点数大约决定了总高度
                // 采用系数放大机制：节点总数 * (设定的间距 + 字体高度 + 冗余) * 放大系数
                const calculatedHeight = 400 + (nodeSet.size * chartStyle.value.nodeGap * 0.8);
                // 确保画布最低不少于 750px
                return Math.max(750, calculatedHeight);
            });

            // 当动态高度改变时，通知 ECharts 重绘适应新高度
            watch(dynamicCanvasHeight, () => {
                nextTick(() => {
                    if (chartInstances[activeTabId.value]) {
                        chartInstances[activeTabId.value].resize();
                    }
                });
            });

            const autoGeneratedTotalData = computed(() => {
                let lines = [];
                const energyTabs = tabs.value.filter(t => t.isEnergy && t.data.trim());

                energyTabs.forEach(tab => {
                    const rawLines = tab.data.trim().split('\n');
                    const links = []; const sources = new Set(); const targets = new Set();

                    rawLines.forEach(l => {
                        const p = l.trim().split(/\s+/);
                        if (p.length >= 3) {
                            const v = parseFloat(p[2]);
                            if (!isNaN(v)) {
                                links.push({ s: p[0], t: p[1], v: v });
                                sources.add(p[0]); targets.add(p[1]);
                            }
                        }
                    });

                    const roots = [...sources].filter(x => !targets.has(x));
                    let tabTotal = 0;
                    roots.forEach(r => {
                        const outSum = links.filter(l => l.s === r).reduce((sum, l) => sum + l.v, 0);
                        tabTotal += outSum;
                        lines.push(`${tab.name} ${r} ${(outSum * tab.factor).toFixed(2)}`);
                    });
                    
                    if(tabTotal > 0) {
                        lines.unshift(`综合能耗总计 ${tab.name} ${(tabTotal * tab.factor).toFixed(2)}`);
                    }
                    links.forEach(l => lines.push(`${l.s} ${l.t} ${(l.v * tab.factor).toFixed(2)}`));
                });
                return lines.join('\n');
            });

            watch(autoGeneratedTotalData, (v) => {
                const t = tabs.value.find(x => x.id === 'total');
                if(t) t.data = v;
            }, { immediate: true });

            // 彻底去除透明背景框
            const buildRichTextConfig = (config) => {
                const base = {
                    fontSize: config.fontSize,
                    color: config.textColor || config.color || '#000',
                    fontWeight: config.isBold ? 'bold' : 'normal',
                    fontStyle: config.isItalic ? 'italic' : 'normal',
                    textDecoration: config.isUnderline ? 'underline' : 'none'
                };
                return {
                    cn: { ...base, fontFamily: config.fontFamilyCN },
                    en: { ...base, fontFamily: config.fontFamilyEN },
                    mixed: { ...base, fontFamily: `${config.fontFamilyEN}, ${config.fontFamilyCN}` } 
                };
            };

            const renderChart = () => {
                const tabId = activeTabId.value;
                const dom = document.getElementById('chart_' + tabId);
                if (!dom) return;

                if (!chartInstances[tabId]) {
                    chartInstances[tabId] = echarts.init(dom);
                    chartInstances[tabId].on('click', (params) => {
                        if (params.dataType === 'node') {
                            selectedElement.value = { name: params.name };
                            if (!elementStyles.value[elementKey.value]) {
                                elementStyles.value[elementKey.value] = { 
                                    color: params.color, opacity: 1, 
                                    fontFamilyCN: chartStyle.value.fontFamilyCN,
                                    fontFamilyEN: chartStyle.value.fontFamilyEN,
                                    fontSize: chartStyle.value.fontSize,
                                    isBold: chartStyle.value.isBold,
                                    isItalic: chartStyle.value.isItalic,
                                    isUnderline: chartStyle.value.isUnderline,
                                    labelPosition: '' 
                                };
                            }
                        } else if (params.dataType === 'edge') {
                            selectedElement.value = { source: params.data.source, target: params.data.target };
                            if (!elementStyles.value[elementKey.value]) {
                                elementStyles.value[elementKey.value] = { color: params.color, opacity: chartStyle.value.opacity };
                            }
                        }
                    });
                }
                const chartInstance = chartInstances[tabId];
                const tab = currentTab.value;
                const lines = tab.data.trim().split('\n');
                const links = []; const nodeSet = new Set();
                
                lines.forEach(l => {
                    const p = l.trim().split(/\s+/);
                    if (p.length >= 3) {
                        const v = parseFloat(p[2]);
                        if (!isNaN(v) && v > 0) {
                            const link = { source: p[0], target: p[1], value: v };
                            const key = `link_${p[0]}_${p[1]}`;
                            link.lineStyle = { curveness: chartStyle.value.curveness };
                            
                            if (elementStyles.value[key]) {
                                link.lineStyle.color = elementStyles.value[key].color;
                                link.lineStyle.opacity = elementStyles.value[key].opacity;
                            }
                            links.push(link);
                            nodeSet.add(p[0]); nodeSet.add(p[1]);
                        }
                    }
                });

                if (nodeSet.size === 0) {
                    chartInstance.clear();
                    return;
                }

                const nodes = Array.from(nodeSet).map(n => {
                    const node = { name: n };
                    const key = `node_${n}`;
                    if (elementStyles.value[key]) {
                        node.itemStyle = { color: elementStyles.value[key].color, opacity: elementStyles.value[key].opacity };
                        const st = elementStyles.value[key];
                        const customLabel = {
                            rich: buildRichTextConfig({ ...chartStyle.value, ...st })
                        };
                        if (st.labelPosition) customLabel.position = st.labelPosition;
                        node.label = customLabel;
                    }
                    return node;
                });

                const option = {
                    title: {
                        text: `{cn|${tab.name}}{en| (Sankey Diagram)}`,
                        left: 'center', top: 10,
                        textStyle: { rich: { cn: { fontFamily: chartStyle.value.fontFamilyCN, fontSize: 20, fontWeight: 'bold' }, en: { fontFamily: chartStyle.value.fontFamilyEN, fontSize: 20, fontWeight: 'bold' } } }
                    },
                    tooltip: { 
                        textStyle: { fontFamily: `${chartStyle.value.fontFamilyEN}, ${chartStyle.value.fontFamilyCN}` },
                        formatter: (params) => {
                            const u = tab.unit ? `${tab.unit}` : '';
                            if (params.dataType === 'node') {
                                return `${params.name}<br/>总计: <b>${params.value}</b>${u}`;
                            } else if (params.dataType === 'edge') {
                                return `${params.data.source} ➔ ${params.data.target}<br/>流量: <b>${params.value}</b>${u}`;
                            }
                        }
                    },
                    series: [{
                        type: 'sankey',
                        layout: 'none',
                        roam: false, // 彻底关闭原生缩放，防止干扰滚动
                        draggable: chartStyle.value.enableDrag,
                        left: chartStyle.value.marginLeft + '%',
                        right: chartStyle.value.marginRight + '%',
                        top: chartStyle.value.marginTop + '%',
                        bottom: chartStyle.value.marginBottom + '%',
                        nodeWidth: chartStyle.value.nodeWidth,
                        nodeGap: chartStyle.value.nodeGap,
                        data: nodes,
                        links: links,
                        lineStyle: { color: 'source', opacity: chartStyle.value.opacity, curveness: chartStyle.value.curveness }, 
                        labelLayout: { hideOverlap: false, moveOverlap: 'shiftY' },
                        label: {
                            position: chartStyle.value.labelPosition,
                            // 去除了 {mixed|} 前的空格，实现无缝贴合
                            formatter: (params) => {
                                const unitStr = tab.unit ? `{mixed|${tab.unit}}` : '';
                                return `{cn|${params.name}}\n{en|${params.value}}${unitStr}`;
                            },
                            rich: buildRichTextConfig(chartStyle.value)
                        }
                    }]
                };
                
                chartInstance.setOption(option, false);
            };

            watch([() => currentTab.value?.data, () => currentTab.value?.unit, chartStyle, elementStyles], 
                () => nextTick(renderChart), { deep: true });

            watch(activeTabId, () => {
                nextTick(() => {
                    if(chartInstances[activeTabId.value]) {
                        chartInstances[activeTabId.value].resize();
                    }
                    renderChart();
                });
            });

            onMounted(() => {
                nextTick(renderChart);
                window.addEventListener('resize', () => {
                    Object.values(chartInstances).forEach(ins => ins.resize());
                });
            });

            const clearSelection = () => { selectedElement.value = {}; };
            const resetElementStyle = () => { delete elementStyles.value[elementKey.value]; clearSelection(); };
            const addTab = () => {
                const id = 'eng_' + Date.now();
                tabs.value.splice(tabs.value.length - 1, 0, { id, name: '新源', unit: '单位', isEnergy: true, factor: 1, data: "" });
                activeTabId.value = id;
            };
            
            const removeTab = (index) => {
                if(confirm('确认删除该能源标签页吗？')) {
                    const deletedId = tabs.value[index].id;
                    tabs.value.splice(index, 1);
                    if (chartInstances[deletedId]) {
                        chartInstances[deletedId].dispose();
                        delete chartInstances[deletedId];
                    }
                    if (activeTabId.value === deletedId) {
                        activeTabId.value = tabs.value[0].id;
                    }
                }
            };
            
            const downloadChart = () => {
                const inst = chartInstances[activeTabId.value];
                if (!inst) return;
                const url = inst.getDataURL({ type: 'png', pixelRatio: 3, backgroundColor: '#fff' });
                const a = document.createElement('a'); a.download = `${currentTab.value.name}.png`; a.href = url; a.click();
            };

            return { tabs, activeTabId, currentTab, chartStyle, dynamicCanvasHeight, autoGeneratedTotalData, addTab, removeTab, downloadChart,
                     selectedElement, elementStyles, elementKey, clearSelection, resetElementStyle };
        }
    }).mount('#app');
</script>
</body>
</html>
